# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Xcode - Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:

    runs-on: macos-26

    steps:
    - uses: actions/checkout@v4
    - name: Build for iOS
      run: xcodebuild -scheme warp-ios -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone Air' build
    - name: Run tests
      run: xcodebuild -scheme WarpTests -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone Air' test
